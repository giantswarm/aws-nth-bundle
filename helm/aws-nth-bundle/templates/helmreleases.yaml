---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: {{ $.Values.clusterID }}-aws-node-termination-handler
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "aws-nth-bundle.labels" $ | nindent 4 }}
spec:
  url: {{ .Values.ociRepositoryUrl }}
  ref:
    tag: {{ .Chart.AppVersion }}
  interval: 24h
  timeout: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ $.Values.clusterID }}-aws-node-termination-handler
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "aws-nth-bundle.labels" $ | nindent 4 }}
spec:
  releaseName: aws-node-termination-handler
  targetNamespace: kube-system
  storageNamespace: kube-system
{{- with (($.Values.awsNodeTerminationHandler).dependsOn) }}
  dependsOn:
  {{- range . }}
  - name: {{ $.Values.clusterID }}-{{ .name }}
    {{- if .namespace }}
    namespace: {{ .namespace }}
    {{- end }}
  {{- end }}
{{- end }}
  chartRef:
    kind: OCIRepository
    name: {{ $.Values.clusterID }}-aws-node-termination-handler
  kubeConfig:
    secretRef:
      name: {{ $.Values.clusterID }}-kubeconfig
  interval: 1m
  timeout: 15m
  install:
    remediation:
      retries: -1
      remediateLastFailure: false
  upgrade:
    remediation:
      retries: 0
      remediateLastFailure: false
  values:
    upstream:
      enableSqsTerminationDraining: true
      queueURL: {{ include "aws-nth-bundle.queueURL" $ | trim | quote }}
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: {{ include "aws-nth-bundle.nodeRoleArn" $ | quote }}
  valuesFrom:
{{- if or ($.Values.proxy).httpProxy ($.Values.proxy).httpsProxy ($.Values.proxy).noProxy }}
  - kind: Secret
    name: {{ $.Values.clusterID }}-node-termination-handler-proxy
    valuesKey: values
    optional: false
{{- end }}
{{- if (($.Values.awsNodeTerminationHandler).values) }}
  - kind: ConfigMap
    name: {{ $.Values.clusterID }}-node-termination-handler-config
    valuesKey: values
    optional: false
{{- end }}
