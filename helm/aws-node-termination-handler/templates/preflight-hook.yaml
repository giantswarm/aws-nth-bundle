{{- if .Values.preflightCheck.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-preflight-check
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "aws-node-termination-handler.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-preflight-check
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "aws-node-termination-handler.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["{{ .Values.preflightCheck.deploymentName }}"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-preflight-check
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "aws-node-termination-handler.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-preflight-check
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-preflight-check
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-preflight-check
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "aws-node-termination-handler.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "aws-node-termination-handler.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-preflight-check
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: preflight-check
          image: "{{ .Values.preflightCheck.image.registry }}/{{ .Values.preflightCheck.image.name }}:{{ .Values.preflightCheck.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              deployment="{{ .Values.preflightCheck.deploymentName }}"
              namespace="{{ .Release.Namespace }}"

              echo "Checking that deployment ${deployment} exists in namespace ${namespace}..."
              if ! kubectl -n "${namespace}" get deployment "${deployment}" >/dev/null 2>&1; then
                echo "ERROR: deployment ${deployment} not found in namespace ${namespace}."
                echo "aws-pod-identity-webhook must be installed before aws-node-termination-handler."
                exit 1
              fi

              ready=$(kubectl -n "${namespace}" get deployment "${deployment}" -o jsonpath='{.status.readyReplicas}')
              if [ -z "${ready}" ] || [ "${ready}" -lt 1 ]; then
                echo "ERROR: deployment ${deployment} has no ready replicas in namespace ${namespace}."
                kubectl -n "${namespace}" get pods -l app.kubernetes.io/name=aws-pod-identity-webhook -o wide || true
                exit 1
              fi

              echo "OK: deployment ${deployment} has ${ready} ready replica(s) in namespace ${namespace}."
{{- end }}
